name: Update Name Database

on:
  push:
    paths:
      - 'input.txt'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Process input
        run: |
          python3 <<EOF
          import json
          import os

          def load_json(path):
              if os.path.exists(path):
                  with open(path, 'r') as f:
                      return json.load(f)
              return []

          def save_json(path, data):
              # 保存前打印数据的长度，确保文件保存正确
              print(f"Total items before saving: {len(data)}")
              data = sorted(list(set(data)))  # 去重并排序
              print(f"Total items after deduplication: {len(data)}")
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2)

          female = load_json("female_names.json")
          surnames = load_json("surnames.json")

          if os.path.exists("input.txt"):
              with open("input.txt", "r") as f:
                  lines = [l.strip().upper() for l in f.readlines() if l.strip()]  # 转换为大写并去掉空行
                  print(f"Read {len(lines)} lines from input.txt.")  # 打印读取的行数
                  print("Lines read from input.txt:")
                  for line in lines:
                      print(f"Processing: {line}")  # 打印每一行的内容

              mode = None
              updated_female = []  # 新建一个列表存储更新后的女性名字
              updated_surnames = []  # 新建一个列表存储更新后的姓氏

              # 读取 input.txt 中的名字并添加到列表中
              for line in lines:
                  if line == "FEMALE:":
                      mode = "female"
                      continue
                  if line == "SURNAME:":
                      mode = "surname"
                      continue

                  # 移除空格后再添加到列表中
                  line = line.replace(" ", "")  # 去掉名字中的空格
                  if mode == "female":
                      updated_female.append(line)
                  elif mode == "surname":
                      updated_surnames.append(line)

              # 更新 female_names.json 和 surnames.json 中的名字
              female = updated_female
              surnames = updated_surnames

          # 打印最终更新后的数据
          print(f"Total female names to be saved: {len(female)}")
          print(f"Total surnames to be saved: {len(surnames)}")

          save_json("female_names.json", female)
          save_json("surnames.json", surnames)
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add female_names.json surnames.json
          git commit -m "Auto update name database" || echo "No changes"
          git push
